<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags-->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="Colorlib Templates" />
    <meta name="author" content="Colorlib" />
    <meta name="keywords" content="Colorlib Templates" />

    <!-- Title Page-->
    <title>PAR J-YES OSMO</title>

    <!-- Icons font CSS-->
    <link
      href="vendor/mdi-font/css/material-design-iconic-font.min.css"
      rel="stylesheet"
      media="all"
    />
    <link
      href="vendor/font-awesome-4.7/css/font-awesome.min.css"
      rel="stylesheet"
      media="all"
    />
    <!-- Font special for pages-->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i"
      rel="stylesheet"
    />

    <!-- Vendor CSS-->
    <link href="vendor/select2/select2.min.css" rel="stylesheet" media="all" />
    <link
      href="vendor/datepicker/daterangepicker.css"
      rel="stylesheet"
      media="all"
    />

    <!-- Main CSS-->
    <link href="css/main.css" rel="stylesheet" media="all" />

    <link
      href="https://cdn.datatables.net/1.11.6/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.css"
    />
  </head>

  <body>
    <div class="page-wrapper bg-blue p-t-100 p-b-100 font-robo">
      <div class="wrapper wrapper--w800">
        <div class="card card-1">
          <div class="card-heading"></div>
          <div class="card-body">
            <h3 class="title">DAFTAR PESERTA JAMBORE PAR J-YES OSMO</h3>
            <a class="btn btn--radius btn--blue" href="./index.html">
              Tambah Peserta
            </a>
            <br /><br /><br />
            <div class="box col-md-8" style="overflow-x: scroll">
              <table id="data-table" class="table table-striped table-bordered">
                <thead>
                  <tr id="table-headers">
                    <!-- Kolom header akan ditampilkan di sini -->
                  </tr>
                </thead>
                <tbody id="table-body">
                  <!-- Data dari spreadsheet akan ditampilkan di sini -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Jquery JS-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <!-- Vendor JS-->
    <script src="vendor/select2/select2.min.js"></script>
    <script src="vendor/datepicker/moment.min.js"></script>
    <script src="vendor/datepicker/daterangepicker.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.js"></script>
    <script src="https://cdn.datatables.net/1.11.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.6/js/dataTables.bootstrap5.min.js"></script>

    <!-- Main JS-->
    <script src="js/global.js"></script>
    <script>
      const scriptURLGet =
        "https://script.google.com/macros/s/AKfycbwL5z61SbBfL8mFH3Xnebdmlb3L79V3HnOprEfoyA7AUuvHXARAjBuXe6RhbxcU6FyL/exec";
      const tableHeaders = document.getElementById("table-headers");
      const tableBody = document.getElementById("table-body");

      fetch(scriptURLGet, {
        method: "GET", // Menggunakan metode GET untuk mengambil data
      })
        .then((response) => response.json())
        .then((data) => {
          // Mendapatkan header dari data pertama
          const headers = Object.keys(data[0]);

          // Menambahkan header ke tabel
          headers.forEach((header) => {
            const th = document.createElement("th");
            if (header == "timestamp") {
              th.textContent = "Tanggal";
            } else {
              th.textContent = header;
            }
            tableHeaders.appendChild(th);
          });

          // Menambahkan data ke tabel
          data.forEach((row) => {
            const tr = document.createElement("tr");
            headers.forEach((header) => {
              const td = document.createElement("td");
              if (header == "timestamp") {
                // Tanggal awal dalam format ISO
                var tanggalISO = row[header];
                // Membuat objek Date dari tanggal ISO
                var tanggal = new Date(tanggalISO);
                // Mendapatkan tanggal, bulan, dan tahun
                var tanggalStr =
                  tanggal.getDate() +
                  "/" +
                  (tanggal.getMonth() + 1) +
                  "/" +
                  tanggal.getFullYear();
                td.textContent = tanggalStr;
                tr.appendChild(td);
              } else {
                td.textContent = row[header];
                tr.appendChild(td);
              }
            });
            tableBody.appendChild(tr);
          });

          // Inisialisasi DataTables
          $(document).ready(function () {
            $("#data-table").DataTable();
          });
        })
        .catch((error) => console.error("Error!", error.message));
    </script>
  </body>
  <!-- This templates was made by Colorlib (https://colorlib.com) -->
</html>
